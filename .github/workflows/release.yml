name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: wisprnito-darwin-arm64
          - os: macos-13
            target: x86_64-apple-darwin
            artifact: wisprnito-darwin-x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: wisprnito-linux-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary
        run: strip target/${{ matrix.target }}/release/wisprnito

      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/wisprnito dist/
          cd dist
          tar czf ../${{ matrix.artifact }}.tar.gz wisprnito

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            wisprnito-darwin-arm64.tar.gz \
            wisprnito-darwin-x86_64.tar.gz \
            wisprnito-linux-x86_64.tar.gz
